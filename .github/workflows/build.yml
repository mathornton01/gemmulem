name: Build & Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: |
          mkdir -p build && cd build
          cmake ..

      - name: Build
        run: cmake --build build --config Release

      - name: Run all test suites
        run: cd build && ctest --output-on-failure

      - name: List test results
        if: always()
        run: |
          cd build
          echo "=== Test binaries ==="
          ls -la test_* 2>/dev/null || true
          echo "=== CTest results ==="
          ctest --output-on-failure --no-tests=error 2>&1 || true

      - name: CLI smoke test — multinomial
        run: |
          ./build/gemmulem -i extension/R/rgemmulem/inst/extdata/em_tst.csv -t 2>&1 | grep -q "0.999"
          echo "Multinomial smoke test passed"

      - name: CLI smoke test — Gaussian mixture
        run: |
          # Generate test data: two well-separated Gaussians
          python3 -c "
          import random; random.seed(42)
          with open('/tmp/test_gauss.txt','w') as f:
              for _ in range(1000): f.write(str(random.gauss(-4,1))+'\n')
              for _ in range(1000): f.write(str(random.gauss(4,1))+'\n')
          "
          ./build/gemmulem -g /tmp/test_gauss.txt -d Gaussian -k 2 -o /dev/null
          echo "Gaussian smoke test passed"

      - name: CLI smoke test — adaptive
        run: |
          python3 -c "
          import random; random.seed(42)
          with open('/tmp/test_adapt.txt','w') as f:
              for _ in range(500): f.write(str(random.gauss(-5,1))+'\n')
              for _ in range(500): f.write(str(random.gauss(5,1))+'\n')
          "
          ./build/gemmulem -g /tmp/test_adapt.txt --adaptive --kmethod bic --kmax 4 -o /dev/null
          echo "Adaptive smoke test passed"

      - name: CLI smoke test — online EM
        run: |
          ./build/gemmulem -g /tmp/test_gauss.txt -d Gaussian -k 2 --online --batch-size 256 -o /dev/null
          echo "Online EM smoke test passed"

      - name: CLI smoke test — streaming
        run: |
          ./build/gemmulem -g /tmp/test_gauss.txt -d Gaussian -k 2 --stream --chunk-size 500 --passes 5 -o /dev/null
          echo "Streaming smoke test passed"

      - name: CLI smoke test — multivariate
        run: |
          python3 -c "
          import random; random.seed(42)
          with open('/tmp/test_mv.txt','w') as f:
              for _ in range(500): f.write(f'{random.gauss(-3,1)} {random.gauss(-3,1)}\n')
              for _ in range(500): f.write(f'{random.gauss(3,1)} {random.gauss(3,1)}\n')
          "
          ./build/gemmulem -g /tmp/test_mv.txt --mv --dim 2 -k 2 -o /dev/null
          echo "Multivariate smoke test passed"

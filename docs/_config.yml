title: Gemmule
description: "The fastest open-source mixture model library. 35 distribution families. Pure C. Zero dependencies."
theme: just-the-docs
url: "https://mathornton01.github.io/gemmulem"
repository: mathornton01/gemmulem
search_enabled: true

plugins:
  - jekyll-seo-tag

markdown: kramdown
kramdown:
  math_engine: mathjax

nav_external_links:
  - title: GitHub
    url: https://github.com/mathornton01/gemmulem

footer_content: "Copyright &copy; 2022-2026 Micah Thornton & Chanhee Park. GPL v3 License."

color_scheme: dark

aux_links:
  "⭐ Star on GitHub":
    - "//github.com/mathornton01/gemmulem"

aux_links_new_tab: true

callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red
